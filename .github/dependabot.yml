version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 6.0.x is blocked: openapi-typescript (critical for
      # generate:api-types) peers on "^5.x" as of its latest 7.13.0.
      # Revisit when openapi-typescript ships TS 6 support; 6.1+ will
      # open a fresh PR automatically.
      - dependency-name: typescript
        versions: [">=6.0.0 <6.1.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        update-types: [minor, patch, major]
