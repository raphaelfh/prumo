name: Mutation testing (weekly)

# Weekly mutation testing on prumo's extraction services. NOT part of the
# per-PR CI because mutmut runs take 20–40 min on this scope. Manual dispatch
# via the Actions tab is supported for ad-hoc runs.
#
# The gate compares the new mutation score against the baseline in
# docs/superpowers/quality-runs/.mutation-baseline. A delta worse than
# PRUMO_MUTATION_BASELINE_DELTA (default -0.05) fails the run.

on:
  schedule:
    # Sunday 03:00 UTC — quiet hours; mutmut output published as artefact.
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      max_delta:
        description: "Maximum allowed delta vs baseline (e.g. -0.05)"
        required: false
        default: "-0.05"

env:
  PYTHON_VERSION: "3.11"

jobs:
  mutation:
    name: Mutation testing (extraction services)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until baseline stabilises
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres_test
      PRUMO_MUTATION_BASELINE_DELTA: ${{ inputs.max_delta || '-0.05' }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run mutation tests
        working-directory: ${{ github.workspace }}
        run: bash scripts/run_mutation_tests.sh
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ github.run_id }}
          path: |
            docs/superpowers/quality-runs/*/mutation-results.txt
            backend/.mutmut-cache
          retention-days: 90
