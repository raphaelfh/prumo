name: Dependency Audit

# CVE hygiene for a clinical-research platform: pip-audit on the
# backend lock, npm audit on the frontend lock. Weekly + whenever a
# manifest changes in a PR.

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - backend/pyproject.toml
      - backend/uv.lock
      - package.json
      - package-lock.json

jobs:
  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Export locked requirements
        working-directory: backend
        run: uv export --frozen --no-dev --format requirements-txt > requirements-audit.txt
      - name: Audit
        working-directory: backend
        run: uvx pip-audit --strict -r requirements-audit.txt

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit (high+ severity)
        run: npm audit --audit-level=high
