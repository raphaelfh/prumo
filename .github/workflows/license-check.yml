name: License Header Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  license-check:
    name: Check Copyright Headers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Check for missing copyright headers
        run: |
          echo "Verificando cabeçalhos de copyright em arquivos modificados..."
          
          # Obter arquivos modificados no PR
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx|js|jsx)$' | grep -v -E '(test|spec)\.(ts|tsx|js|jsx)$' | grep -v 'node_modules' | grep -v 'dist' || true)
          
          if [ -z "$FILES" ]; then
            echo "Nenhum arquivo de código fonte modificado."
            exit 0
          fi
          
          MISSING_HEADERS=()
          COPYRIGHT_HEADER="Copyright (c) 2025 Raphael Federicci Haddad"
          
          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              if ! grep -q "$COPYRIGHT_HEADER" "$FILE"; then
                MISSING_HEADERS+=("$FILE")
              fi
            fi
          done
          
          if [ ${#MISSING_HEADERS[@]} -gt 0 ]; then
            echo "❌ Os seguintes arquivos estão faltando cabeçalhos de copyright:"
            for FILE in "${MISSING_HEADERS[@]}"; do
              echo "  - $FILE"
            done
            echo ""
            echo "Por favor, adicione o seguinte cabeçalho no topo de cada arquivo:"
            echo ""
            echo "/**"
            echo " * Copyright (c) 2025 Raphael Federicci Haddad."
            echo " * Licensed under the GNU Affero General Public License v3.0 (AGPLv3)."
            echo " * Commercial licenses are available upon request."
            echo " */"
            echo ""
            exit 1
          else
            echo "✅ Todos os arquivos modificados possuem cabeçalhos de copyright."
          fi

