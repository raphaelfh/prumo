name: docs-ci

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/markdownlint.json'
      - '.github/lychee.toml'
      - '.github/cspell.json'
      - '.github/cspell-words.txt'
      - 'scripts/docs/**'
      - '.github/workflows/docs-ci.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      # NOTE: the ignore list below mirrors `.markdownlintignore` at the
      # repo root. markdownlint-cli2@0.22.1 does not read .markdownlintignore
      # natively, so patterns must be repeated here as negation globs.
      # When updating one, update the other.
      - run: npx -y markdownlint-cli2@0.22.1 --config .github/markdownlint.json "**/*.md" "!node_modules/**" "!playwright-report/**" "!test-results/**" "!**/.pytest_cache/**" "!backend/alembic/versions/archive/**" "!docs/superpowers/plans/archive/**" "!docs/superpowers/specs/archive/**" "!docs/superpowers/quality-runs/**" "!docs/superpowers/plans/2026-*-pdf-viewer-*.md" "!docs/superpowers/plans/2026-04-27-sidebar-revitalization.md" "!docs/superpowers/plans/2026-05-03-screening-phase0-foundation.md" "!docs/superpowers/plans/2026-05-21-security-hardening-wave.md" "!docs/superpowers/plans/2026-05-22-dark-light-ux-tokenization.md" "!docs/superpowers/plans/2026-05-24-documentation-overhaul-2026.md" "!docs/superpowers/plans/2026-05-24-integration-test-pollution-cleanup.md" "!docs/superpowers/plans/2026-05-30-in-app-feedback-to-linear.md" "!docs/superpowers/plans/2026-06-06-197-frontend-typecheck-burndown.md" "!docs/superpowers/plans/2026-06-08-*.md" "!docs/superpowers/plans/2026-06-10-dev-workflow-sota.md" "!docs/superpowers/specs/2026-*-design.md" "!.claude/**" "!.github/CODE_OF_CONDUCT.md" "!.github/SECURITY.md" "!.github/PULL_REQUEST_TEMPLATE.md" "!CLAUDE.md" "!docs/superpowers/specs/2026-04-28-pdf-viewer-database-requirements.md" "!docs/superpowers/design-system/sidebar-and-panels.md"

  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npx -y cspell@8.17.5 --config .github/cspell.json "**/*.md"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # Scan only the actively-maintained doc surface.
          # Snapshot / archived content (docs/superpowers/**) is excluded
          # via .github/lychee.toml `exclude_path` and would otherwise
          # gate CI on history rewrites.
          args: '--config .github/lychee.toml README.md backend/README.md llms.txt docs/README.md docs/ROADMAP.md docs/adr docs/reference docs/how-to docs/design-references .github/CONTRIBUTING.md .github/SUPPORT.md'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true

  frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/docs/check-frontmatter.sh

  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: STALENESS_FAIL=0 bash scripts/docs/check-staleness.sh
