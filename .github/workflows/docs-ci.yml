name: docs-ci

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/markdownlint.json'
      - '.github/lychee.toml'
      - '.github/cspell.json'
      - '.github/cspell-words.txt'
      - 'scripts/docs/**'
      - '.github/workflows/docs-ci.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      # Single source of truth for ignores: .markdownlintignore at the
      # repo root (markdownlint-cli reads it via --ignore-path).
      - run: npx -y markdownlint-cli@0.45.0 --config .github/markdownlint.json --ignore-path .markdownlintignore "**/*.md"

  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: npx -y cspell@8.17.5 --config .github/cspell.json "**/*.md"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Non-blocking: external-link checks are documented-flaky (rate
      # limits, transient 5xx). Findings still annotate the run; a hard
      # internal-link gate lives in the frontmatter/path checks.
      - uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          # Scan only the actively-maintained doc surface.
          # Snapshot / archived content (docs/superpowers/**) is excluded
          # via .github/lychee.toml `exclude_path` and would otherwise
          # gate CI on history rewrites.
          args: '--config .github/lychee.toml README.md backend/README.md llms.txt docs/README.md docs/ROADMAP.md docs/adr docs/reference docs/how-to docs/design-references .github/CONTRIBUTING.md .github/SUPPORT.md'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true

  frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/docs/check-frontmatter.sh

  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: STALENESS_FAIL=0 bash scripts/docs/check-staleness.sh
