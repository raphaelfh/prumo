name: CI

on:
  push:
    branches: [main, dev]
  # No `branches:` filter on pull_request: stacked PRs (base = another
  # feature branch) previously got zero CI and merged unverified.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Agent sessions push fixups minutes apart; cancel superseded PR runs.
# Push runs (deploy-gating on main) are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # =================== BACKEND LINT ===================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Ruff (lint)
        run: uv run ruff check .

      - name: Run Ruff (format check)
        run: uv run ruff format --check .

      # MyPy is advisory: 43 files in app/ have accumulated type-error debt
      # from before CI started running. Surface the findings without blocking
      # the required check, then chip away at the debt in focused PRs.
      # TODO: drop `|| true` once mypy clean.
      - name: Run MyPy (type check, advisory)
        run: uv run mypy app --ignore-missing-imports || true

  # =================== ARCHITECTURAL FITNESS ===================
  # REQUIRED gate (promoted from advisory on 2026-05-20 after baselines hit
  # zero across every check). Runs every architectural fitness function from
  # scripts/fitness/. Each script enforces one invariant (migration split,
  # legacy concept blacklist, glossary sync, RLS coverage, ApiResponse
  # envelope, layered-architecture DAG, TanStack-Query key factories).
  #
  # Baselines (scripts/fitness/*.baseline) are all empty as of run
  # 2026-05-20-0130 — any new violation fails CI immediately, no
  # grandfathering. To intentionally accept a regression, add an explicit
  # baseline entry in the same PR with a one-line rationale comment.
  fitness:
    name: Architectural Fitness
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run fitness functions
        env:
          PRUMO_TELEMETRY_OUT: ${{ github.workspace }}/fitness-telemetry.jsonl
        run: bash scripts/fitness/run_all.sh
      - name: Upload telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fitness-telemetry-${{ github.run_id }}
          path: fitness-telemetry.jsonl
          retention-days: 30

  # =================== BACKEND TEST ===================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres_test
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENCRYPTION_KEY: test_encryption_key_32_characters
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5173"

    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the merge-base between origin/<base_ref> and
          # HEAD to compute the diff. The default shallow checkout
          # (fetch-depth=1) leaves git with no common ancestor, breaking
          # the "Diff coverage gate (PR only)" step below with
          # `fatal: origin/<base>...HEAD: no merge base`. Full history is
          # the simplest fix; the repo is small enough that the bandwidth
          # cost is negligible.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install Postgres client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate migration boundaries (no auth.*/storage.* in Alembic files)
        run: bash ../scripts/validate_migration_boundaries.sh
        working-directory: backend

      - name: Bootstrap auth schema stub (Supabase auth.users + RLS helpers)
        run: |
          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          -- Supabase's auth.users carries far more columns (instance_id, aud,
          -- role, encrypted_password, ...). Tests that exercise the JWT path
          -- — notably test_membership_guards.outsider_user — insert with the
          -- minimum useful subset, so mirror it in the stub.
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT,
            instance_id UUID,
            aud TEXT,
            role TEXT
          );
          -- Stub auth.uid() and auth.role(): real implementations live in
          -- Supabase's auth schema. Alembic migrations reference these via
          -- RLS policies, so we need them defined for `alembic upgrade head`
          -- to succeed in CI. Returning NULL is fine for migration time —
          -- tests don't exercise RLS via these helpers.
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text
            LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          -- Supabase pre-creates these roles; migrations GRANT to them.
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END $$;
          -- storage.objects stub: migration 0003 attaches RLS policies to it.
          -- Columns mirror what the policies reference (bucket_id, name).
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.objects (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id TEXT,
            name TEXT,
            owner UUID,
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now(),
            metadata JSONB
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
          SQL

      - name: Apply Alembic migrations
        run: uv run alembic upgrade head

      - name: Seed default data (PROBAST + QUADAS-2 templates)
        run: uv run python -m app.seed

      # Coverage gate timeline:
      #   - was 70 (aspirational, never met)
      #   - lowered to 60 to match the pre-2026-05-24 reality (~60.07%)
      #   - 2026-05-24: F1 (seeded integration conftest) unblocked 196
      #     silently-skipped integration tests; F2 covered
      #     extraction_export_service.py (24% → 92%). Combined floor on
      #     main: 64.06%.
      #   - Gate raised to 62 (floor − 2 pt margin). Next ratchet target:
      #     70% once F4 (repos/services unit tests) lands. After F4,
      #     adopt `--cov-branch` (branch coverage is stricter; measure
      #     first before changing the gate again).
      #
      # Hard rule: never lower this once raised. If a PR drops coverage,
      # the PR adds tests, not the gate that gets relaxed.
      #
      # The global gate is the FLOOR. Two finer-grained gates run on top
      # of it (see steps below):
      #   - Diff coverage gate: lines touched by a PR must hit 80% (PR-only).
      #     Catches "PR ships new code without tests" even when the global
      #     ratchet wouldn't notice the dip yet.
      #   - Critical-path coverage gate: aggregate over backend/.coverage_critical
      #     must hit 85%. Modules where bug = data loss / BOLA / HITL state
      #     corruption cannot regress even by a percentage point.
      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=62 \
            --junitxml=pytest-report.xml

      # Skip budget: the suite once silently skipped ~196 tests in CI
      # (missing seed graph) while staying green. Baseline is 21 skips
      # (run 27179316884); budget 25 leaves headroom without letting a
      # seed/fixture regression hide behind green.
      - name: Enforce pytest skip budget
        run: |
          SKIPPED=$(uv run python -c "
          import xml.etree.ElementTree as ET
          r = ET.parse('pytest-report.xml').getroot()
          ts = r if r.tag == 'testsuite' else r.find('testsuite')
          print(ts.get('skipped', '0'))")
          echo "Skipped tests: $SKIPPED (budget: 25)"
          if [ "$SKIPPED" -gt 25 ]; then
            echo "::error::Skip budget exceeded: $SKIPPED > 25 — a fixture/seed regression is likely hiding behind green."
            exit 1
          fi

      # Diff coverage gate (PR-only, hard fail).
      # Why: a PR that adds 500 LOC with 200 tested still passes the 62%
      # global ratchet, but degrades quality. Gating on diff coverage forces
      # the new code to carry its own weight.
      #
      # `origin/${base_ref}` is the merge target (main or dev). For push
      # events (already in trunk) the step is skipped — diff would be empty.
      #
      # PRUMO_DIFF_COVERAGE_MIN can be overridden via repo variables when
      # iterating on the threshold; default 80 mirrors what most quality
      # gates settle on (SonarCloud "Clean as You Code", Codecov defaults).
      - name: Diff coverage gate (PR only)
        if: github.event_name == 'pull_request'
        env:
          PRUMO_DIFF_COVERAGE_MIN: ${{ vars.PRUMO_DIFF_COVERAGE_MIN || '80' }}
        run: |
          # Belt-and-braces: the job's `actions/checkout` step sets
          # `fetch-depth: 0` so the local clone already has full history,
          # but refetch the base ref explicitly in case a self-hosted
          # runner or future cache rewrite ships a partial tree.
          git fetch --no-tags origin "${{ github.base_ref }}"
          uv run diff-cover coverage.xml \
            --compare-branch="origin/${{ github.base_ref }}" \
            --fail-under="${PRUMO_DIFF_COVERAGE_MIN}" \
            --format "markdown:diff-coverage.md"
          echo "## Diff coverage" >> "$GITHUB_STEP_SUMMARY"
          cat diff-coverage.md >> "$GITHUB_STEP_SUMMARY"

      # Critical-path coverage gate (every run, hard fail).
      # Why: the modules in backend/.coverage_critical have a no-regression
      # contract — bug there means data loss, BOLA, or HITL state corruption.
      # We measure their AGGREGATE (not per-file) so a single trim doesn't
      # need its own justification, but the surface as a whole can never
      # drift below the 85% floor. See backend/.coverage_critical for the
      # current coverage snapshot and the rationale per file.
      - name: Critical-path coverage gate
        env:
          PRUMO_CRITICAL_COVERAGE_MIN: ${{ vars.PRUMO_CRITICAL_COVERAGE_MIN || '85' }}
        run: |
          # Build a comma-separated include pattern from the curated list,
          # stripping comments + blanks.
          INCLUDE=$(grep -Ev '^\s*(#|$)' .coverage_critical | paste -sd, -)
          if [[ -z "${INCLUDE}" ]]; then
            echo "::error::backend/.coverage_critical is empty — refusing to soft-pass critical paths"
            exit 1
          fi
          echo "Critical-path modules: ${INCLUDE}"
          uv run coverage report \
            --include="${INCLUDE}" \
            --fail-under="${PRUMO_CRITICAL_COVERAGE_MIN}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # =================== BACKEND E2E ===================
  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres_test
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENCRYPTION_KEY: test_encryption_key_32_characters
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5173"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Bootstrap auth schema stub
        run: |
          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          -- Supabase's auth.users carries far more columns (instance_id, aud,
          -- role, encrypted_password, ...). Tests that exercise the JWT path
          -- — notably test_membership_guards.outsider_user — insert with the
          -- minimum useful subset, so mirror it in the stub.
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT,
            instance_id UUID,
            aud TEXT,
            role TEXT
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text
            LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          -- Supabase pre-creates these roles; migrations GRANT to them.
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END $$;
          -- storage.objects stub: migration 0003 attaches RLS policies to it.
          -- Columns mirror what the policies reference (bucket_id, name).
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.objects (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id TEXT,
            name TEXT,
            owner UUID,
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now(),
            metadata JSONB
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
          SQL

      - name: Apply Alembic migrations
        run: uv run alembic upgrade head

      - name: Run backend E2E marker suite
        run: uv run pytest -m e2e

  # =================== BACKEND BUILD ===================
  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: review-hub-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =================== FRONTEND LINT ===================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      # Frontend typecheck is clean (#197 burned down from 183 → 0). Now
      # blocking: any new type error fails CI.
      - name: Type check (frontend)
        run: npm run typecheck

  # =================== FRONTEND TESTS ===================
  # 68 vitest files / 451 tests. Never ran in CI before 2026-06-10 — the
  # suite had already rotted once (run-detail mock missed the /view move
  # in #228) precisely because nothing gated it.
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test:run

  # =================== FRONTEND BUILD ===================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_key
          VITE_API_URL: http://localhost:8000

  # =================== E2E CONFIG GATE ===================
  # Single setup job that probes which E2E secrets are configured and exposes
  # the result as job outputs. Downstream e2e jobs gate on those outputs.
  #
  # Why: GitHub does not allow `secrets.*` in job-level `if:` expressions
  # (the workflow YAML fails validation, producing a 0-job/0-second run).
  # Job outputs derived from secrets ARE allowed in `if:`, so we route
  # secret-presence detection through this setup job.
  e2e-config:
    name: E2E config gate
    runs-on: ubuntu-latest
    outputs:
      has_local: ${{ steps.probe.outputs.has_local }}
      has_remote: ${{ steps.probe.outputs.has_remote }}
    steps:
      - id: probe
        env:
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_FRONTEND_URL: ${{ secrets.E2E_FRONTEND_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: |
          if [[ -n "${E2E_API_URL}" ]]; then
            echo "has_local=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_local=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${E2E_FRONTEND_URL}" && -n "${E2E_API_URL}" \
             && -n "${E2E_USER_EMAIL}" && -n "${E2E_USER_PASSWORD}" ]]; then
            echo "has_remote=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_remote=false" >> "$GITHUB_OUTPUT"
          fi

  # =================== E2E SKIP VISIBILITY ===================
  # The Playwright jobs were silently skipped on 30/30 recent runs
  # (secrets unset) while CI stayed green — coverage that reads as
  # existing but doesn't. This job makes the skip loud (warning
  # annotation on every run summary) without breaking PRs.
  e2e-skip-warning:
    name: E2E skip warning
    runs-on: ubuntu-latest
    needs: [e2e-config]
    if: needs.e2e-config.outputs.has_local != 'true'
    steps:
      - run: |
          echo "::warning title=Playwright E2E skipped::E2E_API_URL secret is unset — the entire Playwright suite (171 cases) is NOT running in CI. Configure the E2E secrets or stand up an ephemeral stack job."

  # =================== FRONTEND E2E BASELINE ===================
  frontend-e2e-local:
    name: Frontend E2E Local
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-e2e, e2e-config]
    if: needs.e2e-config.outputs.has_local == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E local projects
        run: npm run test:e2e:local
        env:
          E2E_FRONTEND_URL: ${{ secrets.E2E_FRONTEND_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
          E2E_ARTICLE_ID: ${{ secrets.E2E_ARTICLE_ID }}
          E2E_TEMPLATE_ID: ${{ secrets.E2E_TEMPLATE_ID }}
          E2E_ENTITY_TYPE_ID: ${{ secrets.E2E_ENTITY_TYPE_ID }}

      - name: Upload Playwright local artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-results
          path: |
            playwright-report
            test-results

  # =================== FRONTEND E2E REMOTE ===================
  frontend-e2e-remote:
    name: Frontend E2E Remote Smoke
    runs-on: ubuntu-latest
    needs: [frontend-e2e-local, e2e-config]
    if: needs.e2e-config.outputs.has_remote == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run remote smoke project
        run: npm run test:e2e:remote
        env:
          E2E_FRONTEND_URL: ${{ secrets.E2E_FRONTEND_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN }}
          E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
          E2E_ARTICLE_ID: ${{ secrets.E2E_ARTICLE_ID }}
          E2E_TEMPLATE_ID: ${{ secrets.E2E_TEMPLATE_ID }}
          E2E_ENTITY_TYPE_ID: ${{ secrets.E2E_ENTITY_TYPE_ID }}

      - name: Upload Playwright remote artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-remote-results
          path: |
            playwright-report
            test-results
