# Render Blueprint (Infrastructure as Code) — web service only.
#
# Blueprint "Apply changes" is gated to Render's paid plans, so we keep this
# file scoped to the one service that's already running on free
# (review-hub-backend). Workers + managed Redis are documented at the bottom
# of this file; create them by hand in the dashboard whenever the account
# moves to a paid plan, or reach back to commit 7186fbc / f4d03b7 for the
# full blueprint shape.
# https://docs.render.com/docs/infrastructure-as-code

services:
  - type: web
    # Must match the existing Render service name so the deploy webhook keeps
    # pointing at https://review-hub-backend.onrender.com instead of forking.
    name: review-hub-backend
    runtime: python
    rootDir: backend
    branch: main
    region: virginia
    plan: free
    buildCommand: pip install -e .
    # Gunicorn default worker timeout is 30s; template clone + DB round-trips to
    # Supabase often exceed that in production. Keep this >= frontend clone timeout.
    # Only the web service runs Alembic — worker (when present) boots after.
    startCommand: alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -w 1 -t 120 -b 0.0.0.0:$PORT app.main:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Set in the dashboard (do not rotate via generateValue when migrating an existing service).
      - key: ENCRYPTION_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.0
      # REDIS_URL: when no worker + Redis exist yet, leave this unset and the
      # backend falls back to redis://localhost:6379/0 inside celery_app.py.
      # Endpoints that enqueue Celery tasks (articles_export, zotero_import)
      # will return errors until a real Redis URL is provided here.
      - key: REDIS_URL
        sync: false

# -------------------------------------------------------------------------
# Manual setup (when on a paid Render plan, recreate by hand in Dashboard):
#
#   1. Background Worker
#      Name:           review-hub-worker
#      Runtime:        Python
#      Root dir:       backend
#      Branch:         main
#      Region:         virginia
#      Build command:  pip install -e .
#      Start command:  celery -A app.worker.celery_app worker --loglevel=info --queues=extractions,imports,exports,celery
#      Env vars:       same DATABASE_URL / DIRECT_DATABASE_URL / SUPABASE_*
#                      / OPENAI_API_KEY / ENCRYPTION_KEY as the web service
#                      (set ENCRYPTION_KEY to the *same* value — Zotero
#                      credential decryption must be cross-process), DEBUG=false,
#                      PYTHON_VERSION=3.12.0, REDIS_URL = the keyvalue's
#                      connection string from step 2.
#
#   2. Managed Redis (Key Value)
#      Name:           review-hub-redis
#      Region:         virginia
#      Plan:           starter or higher (free Key Value tier was removed)
#      IP allow list:  empty  # private network only, no public ingress
#      Copy the connection string into the web service AND the worker as
#      REDIS_URL (sync: false in this file — set manually per service).
#
# Once both exist, endpoints that enqueue Celery tasks (articles_export,
# zotero_import) start working in prod again. The code path for those is
# already on main — only the infra was missing.
